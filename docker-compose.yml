services:
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        # Required at image build time: Next inlines NEXT_PUBLIC_* into the client bundle.
        NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
        NEXT_PUBLIC_DEMO_MODE_ENABLED: ${NEXT_PUBLIC_DEMO_MODE_ENABLED:-true}
    environment:
      AGENT_RUNTIME_URL: http://agent-runtime:8000
      AGENT_EXECUTION_TIMEOUT_SECONDS: ${AGENT_EXECUTION_TIMEOUT_SECONDS:-10}
      NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
      NEXT_PUBLIC_DEMO_MODE_ENABLED: ${NEXT_PUBLIC_DEMO_MODE_ENABLED:-true}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_REASONING_MODEL: ${OPENAI_REASONING_MODEL}
      OPENAI_DEFAULT_MODEL: ${OPENAI_DEFAULT_MODEL:-}
      OPENAI_FAST_MODEL: ${OPENAI_FAST_MODEL:-}
      OPENAI_CODEX_MODEL: ${OPENAI_CODEX_MODEL:-}
      PILOT_MAX_ACTIVE_PROJECTS_PER_ORGANIZATION: ${PILOT_MAX_ACTIVE_PROJECTS_PER_ORGANIZATION:-5}
      LLM_BACKEND: ${LLM_BACKEND:-openai_api}
      CODEX_SUBSCRIPTION_RUNNER_URL: http://codex-runner:8100
      CODEX_SUBSCRIPTION_RUNNER_SECRET: ${CODEX_SUBSCRIPTION_RUNNER_SECRET:-}
      CODEX_SUBSCRIPTION_MODEL: ${CODEX_SUBSCRIPTION_MODEL:-}
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      agent-runtime:
        condition: service_healthy
      codex-runner:
        condition: service_healthy
    volumes:
      - ./generated:/app/generated
  codex-runner:
    build:
      context: apps/agent-runtime
    command: ["uvicorn", "app.codex_runner_api:app", "--host", "0.0.0.0", "--port", "8100"]
    ports:
      - "127.0.0.1:8100:8100"
    environment:
      CODEX_HOME: /codex-home
      CODEX_SUBSCRIPTION_RUNNER_SECRET: ${CODEX_SUBSCRIPTION_RUNNER_SECRET:-}
      CODEX_SUBSCRIPTION_MODEL: ${CODEX_SUBSCRIPTION_MODEL:-}
      CODEX_SUBSCRIPTION_TIMEOUT_SECONDS: ${CODEX_SUBSCRIPTION_TIMEOUT_SECONDS:-120}
      CODEX_SUBSCRIPTION_MAX_IMAGES: ${CODEX_SUBSCRIPTION_MAX_IMAGES:-8}
      CODEX_SUBSCRIPTION_MAX_IMAGE_PAYLOAD_BYTES: ${CODEX_SUBSCRIPTION_MAX_IMAGE_PAYLOAD_BYTES:-12000000}
    volumes:
      - codex-subscription-auth:/codex-home
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8100/health')"]
      interval: 10s
      timeout: 3s
      retries: 5
  agent-runtime:
    build:
      context: apps/agent-runtime
    ports:
      - "127.0.0.1:8001:8000"
    environment:
      TACIT_GENERATED_ROOT: /generated
      NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      EVIDENCE_TRANSCRIPTION_MODEL: ${EVIDENCE_TRANSCRIPTION_MODEL:-}
      EVIDENCE_TRANSCRIPTION_PROVIDER: ${EVIDENCE_TRANSCRIPTION_PROVIDER:-openai}
      EVIDENCE_AUDIO_TRANSCRIPTION_PROVIDER: ${EVIDENCE_AUDIO_TRANSCRIPTION_PROVIDER:-}
      EVIDENCE_VIDEO_TRANSCRIPTION_PROVIDER: ${EVIDENCE_VIDEO_TRANSCRIPTION_PROVIDER:-}
      EVIDENCE_VISION_MODEL: ${EVIDENCE_VISION_MODEL:-}
      EVIDENCE_VISION_DETAIL: ${EVIDENCE_VISION_DETAIL:-high}
      EVIDENCE_VISION_ESCALATION_DETAIL: ${EVIDENCE_VISION_ESCALATION_DETAIL:-original}
      EVIDENCE_VISION_MIN_CONFIDENCE: ${EVIDENCE_VISION_MIN_CONFIDENCE:-0.75}
      EVIDENCE_VIDEO_COVERAGE_SECONDS: ${EVIDENCE_VIDEO_COVERAGE_SECONDS:-15}
      EVIDENCE_VIDEO_MAX_FRAMES: ${EVIDENCE_VIDEO_MAX_FRAMES:-60}
      EVIDENCE_VIDEO_SCENE_THRESHOLD: ${EVIDENCE_VIDEO_SCENE_THRESHOLD:-0.2}
      EVIDENCE_MODAL_TRANSCRIPTION_URL: ${EVIDENCE_MODAL_TRANSCRIPTION_URL:-}
      EVIDENCE_MODAL_PROXY_AUTH_KEY: ${EVIDENCE_MODAL_PROXY_AUTH_KEY:-}
      EVIDENCE_MODAL_PROXY_AUTH_SECRET: ${EVIDENCE_MODAL_PROXY_AUTH_SECRET:-}
      AGENT_SANDBOX_IMAGE: ${AGENT_SANDBOX_IMAGE:-tacit-agent-sandbox:latest}
    volumes:
      - ./generated:/generated:ro
      - /var/run/docker.sock:/var/run/docker.sock
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 3s
      retries: 5
  ingestion-worker:
    build:
      context: apps/agent-runtime
    command: ["python", "-m", "app.ingestion_worker"]
    environment:
      NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      EVIDENCE_TRANSCRIPTION_MODEL: ${EVIDENCE_TRANSCRIPTION_MODEL:-}
      EVIDENCE_TRANSCRIPTION_PROVIDER: ${EVIDENCE_TRANSCRIPTION_PROVIDER:-openai}
      EVIDENCE_AUDIO_TRANSCRIPTION_PROVIDER: ${EVIDENCE_AUDIO_TRANSCRIPTION_PROVIDER:-}
      EVIDENCE_VIDEO_TRANSCRIPTION_PROVIDER: ${EVIDENCE_VIDEO_TRANSCRIPTION_PROVIDER:-}
      EVIDENCE_VISION_MODEL: ${EVIDENCE_VISION_MODEL:-}
      EVIDENCE_VISION_DETAIL: ${EVIDENCE_VISION_DETAIL:-high}
      EVIDENCE_VISION_ESCALATION_DETAIL: ${EVIDENCE_VISION_ESCALATION_DETAIL:-original}
      EVIDENCE_VISION_MIN_CONFIDENCE: ${EVIDENCE_VISION_MIN_CONFIDENCE:-0.75}
      EVIDENCE_VIDEO_COVERAGE_SECONDS: ${EVIDENCE_VIDEO_COVERAGE_SECONDS:-15}
      EVIDENCE_VIDEO_MAX_FRAMES: ${EVIDENCE_VIDEO_MAX_FRAMES:-60}
      EVIDENCE_VIDEO_SCENE_THRESHOLD: ${EVIDENCE_VIDEO_SCENE_THRESHOLD:-0.2}
      EVIDENCE_MODAL_TRANSCRIPTION_URL: ${EVIDENCE_MODAL_TRANSCRIPTION_URL:-}
      EVIDENCE_MODAL_PROXY_AUTH_KEY: ${EVIDENCE_MODAL_PROXY_AUTH_KEY:-}
      EVIDENCE_MODAL_PROXY_AUTH_SECRET: ${EVIDENCE_MODAL_PROXY_AUTH_SECRET:-}
      EVIDENCE_WORKER_POLL_SECONDS: 5
    restart: unless-stopped
  source-intelligence-worker:
    build:
      context: apps/agent-runtime
    command: ["python", "-m", "app.source_intelligence_worker"]
    environment:
      NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      LLM_BACKEND: ${LLM_BACKEND:-openai_api}
      EVIDENCE_SOURCE_INTELLIGENCE_BACKEND: ${EVIDENCE_SOURCE_INTELLIGENCE_BACKEND:-}
      CODEX_SUBSCRIPTION_RUNNER_URL: http://codex-runner:8100
      CODEX_SUBSCRIPTION_RUNNER_SECRET: ${CODEX_SUBSCRIPTION_RUNNER_SECRET:-}
      CODEX_SUBSCRIPTION_MODEL: ${CODEX_SUBSCRIPTION_MODEL:-}
      CODEX_SUBSCRIPTION_MAX_IMAGES: ${CODEX_SUBSCRIPTION_MAX_IMAGES:-8}
      EVIDENCE_VISION_MODEL: ${EVIDENCE_VISION_MODEL:-}
      EVIDENCE_VISION_DETAIL: ${EVIDENCE_VISION_DETAIL:-high}
      EVIDENCE_VISION_ESCALATION_DETAIL: ${EVIDENCE_VISION_ESCALATION_DETAIL:-original}
      EVIDENCE_VISION_MIN_CONFIDENCE: ${EVIDENCE_VISION_MIN_CONFIDENCE:-0.75}
      EVIDENCE_VIDEO_COVERAGE_SECONDS: ${EVIDENCE_VIDEO_COVERAGE_SECONDS:-15}
      EVIDENCE_VIDEO_MAX_FRAMES: ${EVIDENCE_VIDEO_MAX_FRAMES:-60}
      EVIDENCE_VIDEO_SCENE_THRESHOLD: ${EVIDENCE_VIDEO_SCENE_THRESHOLD:-0.2}
      EVIDENCE_VIDEO_FRAME_BATCH_SIZE: ${EVIDENCE_VIDEO_FRAME_BATCH_SIZE:-8}
      EVIDENCE_SOURCE_MAX_TEXT_CHARS: ${EVIDENCE_SOURCE_MAX_TEXT_CHARS:-60000}
      SOURCE_INTELLIGENCE_WORKER_POLL_SECONDS: ${SOURCE_INTELLIGENCE_WORKER_POLL_SECONDS:-5}
    depends_on:
      codex-runner:
        condition: service_healthy
    restart: unless-stopped
volumes:
  codex-subscription-auth:
