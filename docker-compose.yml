services:
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    environment:
      AGENT_RUNTIME_URL: http://agent-runtime:8000
    ports:
      - "3000:3000"
    depends_on:
      agent-runtime:
        condition: service_healthy
    volumes:
      - ./generated:/app/generated
  agent-runtime:
    build:
      context: apps/agent-runtime
    ports:
      - "8000:8000"
    environment:
      TACIT_GENERATED_ROOT: /generated
      NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      EVIDENCE_TRANSCRIPTION_MODEL: ${EVIDENCE_TRANSCRIPTION_MODEL}
      CLAMAV_HOST: clamav
      AGENT_SANDBOX_IMAGE: ${AGENT_SANDBOX_IMAGE:-tacit-agent-sandbox:latest}
    volumes:
      - ./generated:/generated:ro
      - /var/run/docker.sock:/var/run/docker.sock
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 3s
      retries: 5
  ingestion-worker:
    build:
      context: apps/agent-runtime
    command: ["python", "-m", "app.ingestion_worker"]
    environment:
      NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      EVIDENCE_TRANSCRIPTION_MODEL: ${EVIDENCE_TRANSCRIPTION_MODEL}
      CLAMAV_HOST: clamav
      EVIDENCE_WORKER_POLL_SECONDS: 5
    depends_on:
      clamav:
        condition: service_healthy
    restart: unless-stopped
  clamav:
    image: clamav/clamav:1.4
    healthcheck:
      test: ["CMD-SHELL", "clamdscan --version"]
      interval: 30s
      timeout: 10s
      retries: 20
    restart: unless-stopped
